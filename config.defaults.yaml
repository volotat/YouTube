# Default configuration for the YouTube module.
# These values are auto-merged into the main config at startup.
# Override any of them by adding a `YouTube:` section to root config.yaml.

YouTube:
  name: YouTube
  storage_directory: /mnt/project_config/modules/YouTube
  media_formats:
    - .link
  # How often (minutes) to check tracked channels for newly published videos.
  # Set to 0 to disable automatic channel syncing.
  channel_update_interval_minutes: 480
  # How many of the most-recent videos to inspect per channel per sync cycle.
  # YouTube returns videos newest-first, so this window only needs to cover
  # how many videos a prolific channel could post within the interval above.
  channel_update_recent_count: 50
  # How often (minutes) to score unscored or stale videos (up to 1000 per cycle).
  score_interval_minutes: 15
  # How often (minutes) to run the transcript backfill task.
  # Fetches subtitles for existing videos whose .meta files lack transcripts.
  transcript_backfill_interval_minutes: 40
  # How many videos to process per backfill cycle (shared by both backfill tasks).
  transcript_backfill_batch_size: 50
  # How often (minutes) to run the precise-date backfill task.
  # Gradually upgrades date-only publish_date values to full UTC datetimes by
  # re-fetching the Unix timestamp from YouTube for each affected video.
  # Set to 0 to disable.
  precise_date_backfill_interval_minutes: 15
  # How many videos to upgrade per precise-date backfill cycle.
  precise_date_backfill_batch_size: 200
